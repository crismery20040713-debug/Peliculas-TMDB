<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineWave | Catálogo de Películas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar sticky-top navbar-dark bg-dark shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">CINE<span class="text-warning">WAVE</span></a>
            <div class="search-container">
                <input type="text" id="searchInput" class="form-control" placeholder="Buscar película...">
                <div id="suggestions" class="suggestions-box shadow"></div>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <h1 class="text-center mb-4">Tendencias <span class="text-warning">Populares</span></h1>
        
        <div id="moviesGrid" class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4">
            </div>

        <nav class="mt-5">
            <ul class="pagination justify-content-center">
                <li class="page-item"><button class="page-link" id="prevPage">Anterior</button></li>
                <li class="page-item disabled"><span class="page-link" id="currentPage">1</span></li>
                <li class="page-item"><button class="page-link" id="nextPage">Siguiente</button></li>
            </ul>
        </nav>
    </main>

    <script src="main.js"></script>
</body>
</html>
